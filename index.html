<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 7 퀴즈 — 통계와 통계학</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #eeebe3;
  --border: #ddd9cf;
  --text: #18170f;
  --text2: #6a6457;
  --text3: #a09890;
  --accent: #1a3a8f;
  --accent-light: #e8eeff;
  --correct: #166534;
  --correct-bg: #dcfce7;
  --correct-border: #86efac;
  --wrong: #991b1b;
  --wrong-bg: #fee2e2;
  --wrong-border: #fca5a5;
  --mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--text);
  color: #fff;
  padding: 1.5rem 2rem 1.25rem;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.site-header .course {
  font-size: 11px;
  color: rgba(255,255,255,.5);
  font-family: var(--mono);
  letter-spacing: .06em;
  margin-bottom: 3px;
}
.site-header h1 { font-size: 18px; font-weight: 700; }

.score-pill {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  padding: .375rem .875rem;
  font-family: var(--mono);
  font-size: 13px;
  white-space: nowrap;
  flex-shrink: 0;
}
.score-pill span { color: #86efac; font-weight: 500; }

/* ── PROGRESS ── */
.progress-bar-wrap {
  background: rgba(255,255,255,.15);
  height: 3px;
  width: 100%;
}
.progress-bar-fill {
  height: 100%;
  background: #86efac;
  transition: width .4s ease;
  width: 0%;
}

/* ── LAYOUT ── */
.main {
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem 1.5rem 5rem;
}

/* ── INTRO ── */
.intro {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
  margin-bottom: 2rem;
  text-align: center;
}
.intro .badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: .05em;
  margin-bottom: .875rem;
}
.intro h2 { font-size: 22px; font-weight: 700; margin-bottom: .5rem; }
.intro p  { font-size: 14px; color: var(--text2); line-height: 1.7; }
.intro .meta-row {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}
.intro .meta-item {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
}
.intro .meta-item b { color: var(--text); font-weight: 500; }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 1.25rem;
  overflow: hidden;
  transition: box-shadow .2s;
}
.q-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }

.q-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: 1.125rem 1.25rem .75rem;
  border-bottom: 1px solid var(--border);
}
.q-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: #fff;
  background: var(--accent);
  border-radius: 6px;
  padding: 2px 8px;
  flex-shrink: 0;
}
.q-text {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.55;
  color: var(--text);
}

.q-tag {
  margin-left: auto;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text3);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── OPTIONS ── */
.options { padding: .75rem 1rem 1rem; display: flex; flex-direction: column; gap: .5rem; }

.opt {
  display: flex;
  align-items: flex-start;
  gap: .75rem;
  padding: .75rem .875rem;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
  text-align: left;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  color: var(--text);
  line-height: 1.55;
  width: 100%;
  position: relative;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
}
.opt:active:not(.disabled) { transform: scale(.99); }

.opt-letter {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text2);
  transition: all .15s;
  margin-top: 1px;
}

.opt.correct {
  border-color: var(--correct-border);
  background: var(--correct-bg);
  cursor: default;
}
.opt.correct .opt-letter {
  background: var(--correct);
  border-color: var(--correct);
  color: #fff;
}

.opt.wrong {
  border-color: var(--wrong-border);
  background: var(--wrong-bg);
  cursor: default;
}
.opt.wrong .opt-letter {
  background: var(--wrong);
  border-color: var(--wrong);
  color: #fff;
}

.opt.faded {
  opacity: .45;
  cursor: default;
}

.opt.disabled { cursor: default; }

.opt-text { flex: 1; }

/* ── FEEDBACK ── */
.feedback {
  display: none;
  margin: 0 1rem 1rem;
  padding: .75rem 1rem;
  border-radius: 9px;
  font-size: 13px;
  line-height: 1.65;
}
.feedback.show { display: block; }
.feedback.correct-fb {
  background: var(--correct-bg);
  border: 1px solid var(--correct-border);
  color: var(--correct);
}
.feedback.wrong-fb {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong-border);
  color: var(--wrong);
}
.feedback b { font-weight: 700; }

/* ── RESULTS ── */
.results {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2.5rem 2rem;
  text-align: center;
  margin-top: 2rem;
}
.results.show { display: block; }
.results .big-score {
  font-size: 64px;
  font-weight: 700;
  line-height: 1;
  color: var(--accent);
  font-family: var(--mono);
  margin-bottom: .5rem;
}
.results .score-label { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
.results .grade {
  display: inline-block;
  font-size: 22px;
  font-weight: 700;
  padding: .5rem 1.5rem;
  border-radius: 10px;
  margin-bottom: 1.5rem;
}
.grade-s { background: #fef9c3; color: #854d0e; }
.grade-a { background: var(--correct-bg); color: var(--correct); }
.grade-b { background: var(--accent-light); color: var(--accent); }
.grade-c { background: var(--wrong-bg); color: var(--wrong); }

.results .msg { font-size: 15px; color: var(--text2); margin-bottom: 2rem; line-height: 1.7; }
.results .breakdown {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 2rem;
}
.breakdown-item {
  background: var(--bg);
  border-radius: 9px;
  padding: .875rem;
}
.breakdown-item .bd-num {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 500;
  margin-bottom: 2px;
}
.breakdown-item .bd-label { font-size: 11px; color: var(--text3); }
.bd-correct .bd-num { color: var(--correct); }
.bd-wrong   .bd-num { color: var(--wrong); }
.bd-total   .bd-num { color: var(--accent); }

.btn-reset {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: .875rem 2rem;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn-reset:hover  { opacity: .85; }
.btn-reset:active { transform: scale(.98); }

/* ── FOOTER ── */
.page-footer {
  text-align: center;
  padding: 2rem;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

@media (max-width: 540px) {
  .site-header { padding: 1rem 1.25rem; }
  .site-header h1 { font-size: 15px; }
  .results .breakdown { grid-template-columns: 1fr; }
  .results .big-score { font-size: 48px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="course">지역혁신연구방법론 · WEEK 7</div>
    <h1>통계와 통계학 퀴즈</h1>
  </div>

  </div>

  <div id="quizContainer"></div>
  <div class="results" id="results">
    <div class="big-score" id="bigScore">0%</div>

      <div class="breakdown-item bd-correct">

      </div>

    <button class="btn-reset" onclick="resetQuiz()">다시 풀기</button>
  </div>

</main>

<footer class="page-footer">지역혁신연구방법론 2026-1 · Week 7 · 통계와 통계학</footer>

let answered = new Array(questions.length).fill(false);
let correctCount = 0;

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  const letters = ['①', '②', '③', '④'];

  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${qi}`;

    const header = document.createElement('div');
    header.className = 'q-header';
    header.innerHTML = `
      <span class="q-num">Q${qi + 1}</span>
      <span class="q-text">${q.text}</span>
      <span class="q-tag">${q.tag}</span>
    `;
    card.appendChild(header);

    const opts = document.createElement('div');
    opts.className = 'options';

    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.id = `q${qi}_o${oi}`;
      btn.innerHTML = `<span class="opt-letter">${letters[oi]}</span><span class="opt-text">${opt}</span>`;
      btn.addEventListener('click', () => selectAnswer(qi, oi));
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = `fb${qi}`;
    card.appendChild(fb);

    container.appendChild(card);
  });

  updateScore();
}

function selectAnswer(qi, oi) {
  if (answered[qi]) return;
  answered[qi] = true;

  const q = questions[qi];
  const letters = ['①', '②', '③', '④'];
  const fbEl = document.getElementById(`fb${qi}`);
  const opts = document.querySelectorAll(`#q${qi} .opt`);

  opts.forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (idx === q.answer) {
      btn.classList.add('correct');
    } else if (idx === oi && oi !== q.answer) {
      btn.classList.add('wrong');
    } else if (idx !== oi) {
      btn.classList.add('faded');
    }
  });

  const isCorrect = oi === q.answer;
  if (isCorrect) correctCount++;

  fbEl.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fbEl.innerHTML = isCorrect
    ? `✅ <b>정답!</b> ${q.fb}`
    : `❌ <b>오답.</b> 정답은 ${letters[q.answer]}입니다. ${q.fb}`;

  updateScore();

  const answeredCount = answered.filter(Boolean).length;
  if (answeredCount === questions.length) {
    setTimeout(showResults, 600);
  }
}

function updateScore() {
  const answeredCount = answered.filter(Boolean).length;
  document.getElementById('scoreDisplay').textContent = correctCount;
  document.getElementById('totalDisplay').textContent = answeredCount;
  const pct = questions.length > 0 ? (answeredCount / questions.length) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function showResults() {
  const pct = Math.round((correctCount / questions.length) * 100);
  document.getElementById('bigScore').textContent = pct + '%';
  document.getElementById('scoreLabel').textContent = `${questions.length}문항 중 ${correctCount}개 정답`;
  document.getElementById('bdCorrect').textContent = correctCount;
  document.getElementById('bdWrong').textContent = questions.length - correctCount;

  let grade, gradeClass, msg;
  if (pct >= 93) {
    grade = '🏆 S등급'; gradeClass = 'grade-s';
    msg = '완벽합니다! 통계와 통계학의 핵심 개념을 완전히 이해했습니다.';
  } else if (pct >= 80) {
    grade = '✅ A등급'; gradeClass = 'grade-a';
    msg = '훌륭해요! 핵심 개념을 잘 이해하고 있습니다. 틀린 문항을 한 번 더 확인해 보세요.';
  } else if (pct >= 60) {
    grade = '📘 B등급'; gradeClass = 'grade-b';
    msg = '기본 개념은 잡혔어요. 상관관계·인과관계 구분과 데이터 타입을 다시 복습해 보세요.';
  } else {
    grade = '📖 복습 필요'; gradeClass = 'grade-c';
    msg = '핵심 용어 정리 자료를 다시 읽고 재도전해 보세요! 여러 번 풀수록 확실해집니다.';
  }

  const gradeEl = document.getElementById('gradeBox');
  gradeEl.textContent = grade;
  gradeEl.className = `grade ${gradeClass}`;
  document.getElementById('resultMsg').textContent = msg;

  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('show');
  setTimeout(() => resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function resetQuiz() {
  answered = new Array(questions.length).fill(false);
  correctCount = 0;
  document.getElementById('results').classList.remove('show');
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
